# flag_storage_frontend/nginx.conf
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Прокси к Go-сервисам
    location /products {
        proxy_pass http://product:8083;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/documents {
        # Переписываем /api/documents и /api/documents/... на /api/files...
        rewrite ^/api/documents/?(.*)$ /api/files/$1 break;
        proxy_pass http://documents:8082;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Прокси для OnlyOffice Document Server (если запущен в том же compose)
    location /onlyoffice/ {
        proxy_pass http://onlyoffice:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
