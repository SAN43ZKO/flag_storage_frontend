# Основной сервер для фронтенда и API (HTTP)
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /products {
        proxy_pass http://product:8083;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/documents {
        rewrite ^/api/documents/?$ /api/files break;
        rewrite ^/api/documents/(.*)$ /api/files/$1 break;
        proxy_pass http://documents:8082;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        gzip off;
        client_max_body_size 100m;
    }

    location /wopi/ {
        proxy_pass http://documents:8082;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        gzip off;
        client_max_body_size 100m;
    }
}

# Отдельный сервер для Collabora (HTTPS)
server {
    listen 9980 ssl;
    server_name _;

    ssl_certificate /etc/nginx/ssl/nginx.crt;
    ssl_certificate_key /etc/nginx/ssl/nginx.key;

    # static files
    location ^~ /browser {
        proxy_pass http://collabora:9980;
        proxy_set_header Host $host;
    }

    # WOPI discovery
    location ^~ /hosting {
        proxy_pass http://collabora:9980;
        proxy_set_header Host $host;
    }

    # main websocket, download, presentation, image upload
    location ^~ /cool/ {
        proxy_pass http://collabora:9980;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 36000s;
    }
}
