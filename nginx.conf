# flag_storage_frontend/nginx.conf
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Прокси к Go-сервисам
    location /products {
        proxy_pass http://product:8083;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/documents {
        # Точный путь /api/documents или /api/documents/ → /api/files
        rewrite ^/api/documents/?$ /api/files break;
        # Все остальные пути /api/documents/... → /api/files/...
        rewrite ^/api/documents/(.*)$ /api/files/$1 break;
        proxy_pass http://documents:8082;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_request_buffering off;
        gzip off;
        client_max_body_size 100m;
}

    # Прокси для OnlyOffice Document Server (если запущен в том же compose)
    location /onlyoffice/ {
        proxy_pass http://onlyoffice:80/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
