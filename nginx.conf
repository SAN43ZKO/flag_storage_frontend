server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # 1. SPA fallback для всех обычных запросов
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 2. API вашего бэкенда
    location /products {
        proxy_pass http://product:8083;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/documents {
        rewrite ^/api/documents/?$ /api/files break;
        rewrite ^/api/documents/(.*)$ /api/files/$1 break;
        proxy_pass http://documents:8082;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        gzip off;
        client_max_body_size 100m;
    }

    location /wopi/ {
        proxy_pass http://documents:8082;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        gzip off;
        client_max_body_size 100m;
    }

    # 3. Прокси до Collabora (включая WebSocket)
    location /collabora/ {
        # Основные настройки прокси
        proxy_pass http://collabora:9980/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Отключаем буферизацию (важно для WebSocket)
        proxy_buffering off;
        proxy_request_buffering off;

        # Два этих заголовка — самое главное для "апгрейда" до WebSocket
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
