server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /products {
        proxy_pass http://product:8083;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/files {
        proxy_pass http://documents:8082;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        proxy_buffering off;
        proxy_request_buffering off;
        gzip off;
        proxy_set_header Accept-Encoding "";   # запрещаем сжатие на стороне бэкенда
        client_max_body_size 100m;

        # Передаём оригинальные заголовки ответа без изменений
        proxy_pass_header Content-Type;
        proxy_pass_header Content-Length;
        proxy_pass_header Content-Disposition;
    }

    location /api/documents {
        rewrite ^/api/documents/?$ /api/files break;
        # rewrite ^/api/documents/(.*)$ /api/files/$1 break;
        proxy_pass http://documents:8082;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        proxy_buffering off;
        gzip off;
        proxy_set_header Accept-Encoding "";
        client_max_body_size 100m;
    }

}
