# Основной HTTPS-сервер для фронтенда и API (порт 443)
server {
    listen 443 ssl;
    server_name _;

    ssl_certificate /etc/nginx/ssl/nginx.crt;
    ssl_certificate_key /etc/nginx/ssl/nginx.key;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /products {
        proxy_pass http://product:8083;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/documents {
        rewrite ^/api/documents/?$ /api/files break;
        rewrite ^/api/documents/(.*)$ /api/files/$1 break;
        proxy_pass http://documents:8082;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        gzip off;
        client_max_body_size 100m;
    }

    location /wopi/ {
        proxy_pass http://documents:8082;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        gzip off;
        client_max_body_size 100m;
    }
}

# Отдельный HTTPS-сервер для Collabora (порт 9980)
# Collabora + WOPI Host (порт 9980)
server {
    listen 9980 ssl;
    server_name _;

    ssl_certificate /etc/nginx/ssl/nginx.crt;
    ssl_certificate_key /etc/nginx/ssl/nginx.key;

    # WOPI Host запросы от Collabora и браузера
    location /wopi/ {
        proxy_pass http://documents:8082;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        gzip off;
        client_max_body_size 100m;
    }

    # статические файлы редактора
    location ^~ /browser {
        proxy_pass http://collabora:9980;
        proxy_set_header Host $host;
    }

    location ^~ /hosting {
        proxy_pass http://collabora:9980;
        proxy_set_header Host $host;
    }

    # WebSocket и API редактирования
    location ^~ /cool/ {
        proxy_pass http://collabora:9980;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 36000s;
    }
}

# Перенаправление HTTP -> HTTPS (для порта 80)
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # WOPI запросы обрабатываем по HTTP без редиректа
    location /wopi/ {
        proxy_pass http://documents:8082;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        gzip off;
        client_max_body_size 100m;
    }

    # Остальное перенаправляем на HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}
