<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <script
      type="text/javascript"
      src="http://localhost:8080/web-apps/apps/api/documents/api.js"
    ></script>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="placeholder" style="height: 100%"></div>
    <script>
      const fileId = new URLSearchParams(window.location.search).get("id");
      if (!fileId) {
        document.body.innerHTML = "Не указан ID файла";
      } else {
        fetch(`/api/documents/${fileId}/edit`)
          .then((res) => res.json())
          .then((config) => {
            console.log("Конфигурация редактора:", config);
            if (typeof DocsAPI !== "undefined") {
              new DocsAPI.DocEditor("placeholder", config);
            } else {
              document.body.innerHTML =
                "API OnlyOffice не загружен. Проверьте консоль.";
            }
          })
          .catch((err) => {
            document.body.innerHTML =
              "Ошибка загрузки конфигурации: " + err.message;
            console.error(err);
          });
      }
    </script>
  </body>
</html>
